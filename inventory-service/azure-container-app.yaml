apiVersion: containerapp.io/v1
kind: ContainerApp
metadata:
  name: inventory-service
  resourceGroup: homeessentials-rg
  location: eastus
spec:
  environment: homeessentials
  template:
    containers:
      - name: inventory-service
        image: homeessentialsacr.azurecr.io/homeessentials-inventory-service:latest
        resources:
          cpu: 0.5
          memory: 1Gi
        ports:
          - containerPort: 3003
            protocol: tcp
        env:
          - name: NODE_ENV
            value: production
          - name: PORT
            value: '3003'
          - name: PRODUCT_SERVICE_URL
            value: http://product-service.homeessentials.local:3002 # NOSONAR - Internal service communication in private Azure Container Apps network
          - name: MONGODB_URI
            secretRef: mongodb-uri
        livenessProbe:
          httpGet:
            path: /health
            port: 3003
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 3003
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
    scale:
      minReplicas: 1
      maxReplicas: 3
      rules:
        - name: http-requests
          custom:
            rule: http.requests.total
            metadata:
              desiredRPS: '100'
  configuration:
    ingress:
      external: true
      targetPort: 3003
      allowInsecure: false
      traffic:
        - latest:
          weight: 100
    secrets:
      - name: mongodb-uri
        keyVaultUrl: https://homeessentials-kv.vault.azure.net/secrets/mongodb-uri
    registry:
      - server: homeessentialsacr.azurecr.io
        username: homeessentialsacr
        passwordSecretRef: acr-password
