version: '3.8'

services:
  # Product Service
  product-service:
    build:
      context: ./product-service
      dockerfile: Dockerfile
    container_name: product-service
    ports:
      - "3002:3002"
    env_file:
      - ./product-service/.env
    environment:
      - NODE_ENV=development
      - PORT=3002
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:3004
    networks:
      - homeessentials-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3002/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Inventory Service
  inventory-service:
    build:
      context: ./inventory-service
      dockerfile: Dockerfile
    container_name: inventory-service
    ports:
      - "3003:3003"
    env_file:
      - ./inventory-service/.env
    environment:
      - NODE_ENV=development
      - PORT=3003
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:3004
      - PRODUCT_SERVICE_URL=http://product-service:3002
    networks:
      - homeessentials-network
    depends_on:
      - product-service
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3003/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

