version: '3.8'

services:
  # API Gateway Service
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    env_file:
      - ./api-gateway/.env
    networks:
      - homeessentials-network
    depends_on:
      - user-service
      - product-service
      - inventory-service
      - order-service
      - payment-service
      - notification-service
    restart: unless-stopped

  # Product Service
  product-service:
    build:
      context: ./product-service
      dockerfile: Dockerfile
    container_name: product-service
    ports:
      - "3002:3002"
    env_file:
      - ./product-service/.env
    environment:
      - NODE_ENV=development
      - PORT=3002
      - ALLOWED_ORIGINS=http://localhost:5173,http://localhost:3000,http://localhost:3004
      - USER_SERVICE_URL=http://user-service:3001
      - USER_SERVICE_BASE_URL=http://user-service:3001
      - PRODUCT_SERVICE_URL=http://product-service:3002
      - PRODUCT_SERVICE_BASE_URL=http://product-service:3002
      - INVENTORY_SERVICE_URL=http://inventory-service:3003
      - INVENTORY_SERVICE_BASE_URL=http://inventory-service:3003
      - ORDER_SERVICE_URL=http://order-service:3004
      - ORDER_SERVICE_BASE_URL=http://order-service:3004
      - PAYMENT_SERVICE_URL=http://payment-service:3005
      - PAYMENT_SERVICE_BASE_URL=http://payment-service:3005
      - NOTIFICATION_SERVICE_URL=http://notification-service:3006
      - NOTIFICATION_SERVICE_BASE_URL=http://notification-service:3006
    networks:
      - homeessentials-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3002/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Inventory Service
  inventory-service:
    build:
      context: ./inventory-service
      dockerfile: Dockerfile
    container_name: inventory-service
    ports:
      - "3003:3003"
    env_file:
      - ./inventory-service/.env
    environment:
      - NODE_ENV=development
      - PORT=3003
      - ALLOWED_ORIGINS=http://localhost:5173,http://localhost:3000,http://localhost:3004
      - USER_SERVICE_URL=http://user-service:3001
      - USER_SERVICE_BASE_URL=http://user-service:3001
      - PRODUCT_SERVICE_URL=http://product-service:3002
      - PRODUCT_SERVICE_BASE_URL=http://product-service:3002
      - INVENTORY_SERVICE_URL=http://inventory-service:3003
      - INVENTORY_SERVICE_BASE_URL=http://inventory-service:3003
      - ORDER_SERVICE_URL=http://order-service:3004
      - ORDER_SERVICE_BASE_URL=http://order-service:3004
      - PAYMENT_SERVICE_URL=http://payment-service:3005
      - PAYMENT_SERVICE_BASE_URL=http://payment-service:3005
      - NOTIFICATION_SERVICE_URL=http://notification-service:3006
      - NOTIFICATION_SERVICE_BASE_URL=http://notification-service:3006
    networks:
      - homeessentials-network
    depends_on:
      - product-service
      - notification-service
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3003/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # User Service
  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: user-service
    ports:
      - "3001:3001"
    env_file:
      - ./user-service/.env
    environment:
      - NODE_ENV=development
      - PORT=3001
      - ALLOWED_ORIGINS=http://localhost:5173,http://localhost:3000,http://localhost:3004
      - USER_SERVICE_URL=http://user-service:3001
      - USER_SERVICE_BASE_URL=http://user-service:3001
      - PRODUCT_SERVICE_URL=http://product-service:3002
      - PRODUCT_SERVICE_BASE_URL=http://product-service:3002
      - INVENTORY_SERVICE_URL=http://inventory-service:3003
      - INVENTORY_SERVICE_BASE_URL=http://inventory-service:3003
      - ORDER_SERVICE_URL=http://order-service:3004
      - ORDER_SERVICE_BASE_URL=http://order-service:3004
      - PAYMENT_SERVICE_URL=http://payment-service:3005
      - PAYMENT_SERVICE_BASE_URL=http://payment-service:3005
      - NOTIFICATION_SERVICE_URL=http://notification-service:3006
      - NOTIFICATION_SERVICE_BASE_URL=http://notification-service:3006
    networks:
      - homeessentials-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Order Service
  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: order-service
    ports:
      - "3004:3004"
    env_file:
      - ./order-service/.env
    environment:
      - NODE_ENV=development
      - PORT=3004
      - ALLOWED_ORIGINS=http://localhost:5173,http://localhost:3000
      - USER_SERVICE_URL=http://user-service:3001
      - USER_SERVICE_BASE_URL=http://user-service:3001
      - PRODUCT_SERVICE_URL=http://product-service:3002
      - PRODUCT_SERVICE_BASE_URL=http://product-service:3002
      - INVENTORY_SERVICE_URL=http://inventory-service:3003
      - INVENTORY_SERVICE_BASE_URL=http://inventory-service:3003
      - ORDER_SERVICE_URL=http://order-service:3004
      - ORDER_SERVICE_BASE_URL=http://order-service:3004
      - PAYMENT_SERVICE_URL=http://payment-service:3005
      - PAYMENT_SERVICE_BASE_URL=http://payment-service:3005
      - NOTIFICATION_SERVICE_URL=http://notification-service:3006
      - NOTIFICATION_SERVICE_BASE_URL=http://notification-service:3006
      - HTTP_CLIENT_TIMEOUT_MS=5000
    networks:
      - homeessentials-network
    depends_on:
      - user-service
      - product-service
      - inventory-service
      - payment-service
      - notification-service
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3004/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Payment Service
  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    container_name: payment-service
    ports:
      - "3005:3005"
    env_file:
      - ./payment-service/.env
    environment:
      - NODE_ENV=development
      - PORT=3005
      - USER_SERVICE_URL=http://user-service:3001
      - USER_SERVICE_BASE_URL=http://user-service:3001
      - PRODUCT_SERVICE_URL=http://product-service:3002
      - PRODUCT_SERVICE_BASE_URL=http://product-service:3002
      - INVENTORY_SERVICE_URL=http://inventory-service:3003
      - INVENTORY_SERVICE_BASE_URL=http://inventory-service:3003
      - ORDER_SERVICE_URL=http://order-service:3004
      - ORDER_SERVICE_BASE_URL=http://order-service:3004
      - PAYMENT_SERVICE_URL=http://payment-service:3005
      - PAYMENT_SERVICE_BASE_URL=http://payment-service:3005
      - NOTIFICATION_SERVICE_URL=http://notification-service:3006
      - NOTIFICATION_SERVICE_BASE_URL=http://notification-service:3006
    networks:
      - homeessentials-network
    restart: unless-stopped

  # Notification Service
  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    ports:
      - "3006:3006"
    env_file:
      - ./notification-service/.env
    environment:
      - NODE_ENV=development
      - PORT=3006
      - ALLOWED_ORIGINS=http://localhost:5173,http://localhost:3000,http://localhost:3004
      - USER_SERVICE_URL=http://user-service:3001
      - USER_SERVICE_BASE_URL=http://user-service:3001
      - PRODUCT_SERVICE_URL=http://product-service:3002
      - PRODUCT_SERVICE_BASE_URL=http://product-service:3002
      - INVENTORY_SERVICE_URL=http://inventory-service:3003
      - INVENTORY_SERVICE_BASE_URL=http://inventory-service:3003
      - ORDER_SERVICE_URL=http://order-service:3004
      - ORDER_SERVICE_BASE_URL=http://order-service:3004
      - PAYMENT_SERVICE_URL=http://payment-service:3005
      - PAYMENT_SERVICE_BASE_URL=http://payment-service:3005
      - NOTIFICATION_SERVICE_URL=http://notification-service:3006
      - NOTIFICATION_SERVICE_BASE_URL=http://notification-service:3006
    networks:
      - homeessentials-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3006/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  homeessentials-network:
    driver: bridge

volumes:
  mongo-data:
